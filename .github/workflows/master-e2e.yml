name: Master full e2e

# Full Playwright suite on PRs into master (and manual dispatch).
# Smoke already ran on develop PRs; this catches the full suite before production.

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: master-e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright-full:
    name: Playwright full suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Require mingo-local smoke secrets
        env:
          SECRET_ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          SMOKE_HOST_EMAIL: ${{ secrets.SMOKE_HOST_EMAIL }}
          SMOKE_HOST_PASSWORD: ${{ secrets.SMOKE_HOST_PASSWORD }}
        run: |
          echo "VITE_SUPABASE_ANON_KEY present (secret): ${{ secrets.VITE_SUPABASE_ANON_KEY != '' }}"
          echo "VITE_SUPABASE_ANON_KEY present (var):    ${{ vars.VITE_SUPABASE_ANON_KEY != '' }}"
          echo "SMOKE_HOST_EMAIL present:               ${{ secrets.SMOKE_HOST_EMAIL != '' }}"
          echo "SMOKE_HOST_PASSWORD present:            ${{ secrets.SMOKE_HOST_PASSWORD != '' }}"
          ok=1
          if [ -z "$SECRET_ANON" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY is empty."
            ok=0
          fi
          if [ -z "$SMOKE_HOST_EMAIL" ]; then
            echo "::error::SMOKE_HOST_EMAIL is required."
            ok=0
          fi
          if [ -z "$SMOKE_HOST_PASSWORD" ]; then
            echo "::error::SMOKE_HOST_PASSWORD is required."
            ok=0
          fi
          [ "$ok" = 1 ] || exit 1

      - name: Configure Vite env for smoke
        env:
          SECRET_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          SECRET_ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          SECRET_GEMINI: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=${SECRET_URL:-https://lmlzduwtrzzjaggqsulr.supabase.co}" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$SECRET_ANON" >> "$GITHUB_ENV"
          if [ -n "$SECRET_GEMINI" ]; then
            echo "GEMINI_API_KEY=$SECRET_GEMINI" >> "$GITHUB_ENV"
          fi

      - name: Run Playwright full suite
        run: npm run test:e2e
        env:
          CI: true
          SMOKE_HOST_EMAIL: ${{ secrets.SMOKE_HOST_EMAIL }}
          SMOKE_HOST_PASSWORD: ${{ secrets.SMOKE_HOST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
