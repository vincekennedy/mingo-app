name: CalVer release on develop

# Stamp package.json with today's date (America/New_York) on develop, then
# promote to production via the usual develop → master PR.
# Same-day follow-ups become YYYY.MM.DD.1, .2, …
#
# Does not push to master (branch rules require PRs there).

on:
  workflow_dispatch:

concurrency:
  group: calver-release-develop
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump CalVer, commit, and tag
        env:
          CALVER_TZ: America/New_York
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          chmod +x scripts/calver-release.sh
          ./scripts/calver-release.sh

      - name: Push release commit and tag to develop
        run: |
          git push origin HEAD:develop
          git push origin --tags
