name: CalVer release on master

# When a release lands on master (production), set package version to today's
# date (America/New_York) and create an annotated-style lightweight tag vYYYY.MM.DD.
# Same-day follow-up releases become vYYYY.MM.DD.1, .2, …

on:
  push:
    branches: [master]

concurrency:
  group: calver-release-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Avoid re-entry when this workflow pushes the release commit
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: release ') }}
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump CalVer, commit, and tag
        env:
          CALVER_TZ: America/New_York
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          chmod +x scripts/calver-release.sh
          ./scripts/calver-release.sh

      - name: Push release commit and tag
        run: |
          git push origin HEAD:master
          git push origin --tags
