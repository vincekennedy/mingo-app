name: PR smoke

# Always-on Playwright checks on PRs into develop (no host secrets required).
# Landing + /api route smoke. Full lifecycle e2e stays local / optional.

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: pr-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright-smoke:
    name: Playwright smoke (landing + api)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Configure Vite env for smoke
        env:
          SECRET_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SECRET_ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SECRET_GEMINI: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Prefer repo secrets (mingo-local). Fall back so CI still boots Vite without them.
          echo "VITE_SUPABASE_URL=${SECRET_URL:-https://lmlzduwtrzzjaggqsulr.supabase.co}" >> "$GITHUB_ENV"
          if [ -n "$SECRET_ANON" ]; then
            echo "VITE_SUPABASE_ANON_KEY=$SECRET_ANON" >> "$GITHUB_ENV"
          else
            echo "::warning::VITE_SUPABASE_ANON_KEY secret not set; using placeholder JWT for Vite boot. Add the mingo-local anon key under Settings → Secrets for closer-to-local smoke."
            echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtbHpkdXd0cnp6amFnZ3FzdWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.smoke-ci-placeholder" >> "$GITHUB_ENV"
          fi
          if [ -n "$SECRET_GEMINI" ]; then
            echo "GEMINI_API_KEY=$SECRET_GEMINI" >> "$GITHUB_ENV"
          fi

      - name: Run smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
