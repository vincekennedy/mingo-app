name: Supabase db push

# Apply pending supabase/migrations to remote projects.
# develop → Mingo-local; master → production Mingo.
# Requires repo secrets (see supabase/README.md):
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_DB_PASSWORD_LOCAL
#   SUPABASE_DB_PASSWORD_PROD

on:
  push:
    branches: [develop, master]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-db-push.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-db-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-mingo-local:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_LOCAL }}
      SUPABASE_PROJECT_ID: lmlzduwtrzzjaggqsulr
    steps:
      - name: Require Supabase secrets
        run: |
          missing=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing secret SUPABASE_ACCESS_TOKEN (Account → Access Tokens)"
            missing=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing secret SUPABASE_DB_PASSWORD_LOCAL (Mingo-local → Database password)"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Link Mingo-local and push migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push --yes

  push-production:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
      SUPABASE_PROJECT_ID: sngfoaosgskdmkngjglh
    steps:
      - name: Require Supabase secrets
        run: |
          missing=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing secret SUPABASE_ACCESS_TOKEN (Account → Access Tokens)"
            missing=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing secret SUPABASE_DB_PASSWORD_PROD (production Mingo → Database password)"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Link production and push migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push --yes
