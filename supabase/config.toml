# Supabase CLI config (minimal). Link a remote with:
#   npx supabase login
#   npx supabase link --project-ref <your-project-ref>
# Apply migrations with:
#   npx supabase db push

project_id = "lmlzduwtrzzjaggqsulr"

[api]
enabled = true

[db]
major_version = 17

[studio]
enabled = true

[auth]
enable_anonymous_sign_ins = true

# Invoked by ops / optional HTTP cron with service role or GUEST_CLEANUP_CRON_SECRET.
# Daily deletion is primarily pg_cron → public.cleanup_guest_users().
[functions.cleanup-guest-users]
verify_jwt = false
